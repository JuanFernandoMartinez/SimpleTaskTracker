# Use postgres/example user/password credentials

services:
  jenkins:
    image: jenkins/jenkins
    ports:
      - "3003:8080"
      - "3004:50000"
    restart: on-failure
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
volumes:
  jenkins-data:
    driver: local
